repos:
  - repo: local
    hooks:
      - id: format-check
        name: prettier format check
        entry: pnpm format:check
        language: system
        pass_filenames: false
      - id: lint
        name: eslint
        entry: pnpm lint
        language: system
        pass_filenames: false
      - id: typecheck
        name: typescript typecheck
        entry: pnpm typecheck
        language: system
        pass_filenames: false
      - id: test
        name: vitest
        entry: pnpm test
        language: system
        pass_filenames: false
