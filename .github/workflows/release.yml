name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: SemVer version to release. Defaults to apps/extension/package.json.
        required: false
        type: string
      release_notes:
        description: Optional GitHub release notes. Defaults to an automated release note.
        required: false
        type: string
      publish_to_chrome:
        description: Upload and publish to Chrome Web Store.
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NODE_VERSION: 22
      PNPM_VERSION: 10.6.5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          package_version="$(node -p "require('./apps/extension/package.json').version")"
          version="$INPUT_VERSION"
          if [ -z "$version" ]; then
            version="$package_version"
          fi

          if ! printf '%s' "$version" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "Invalid semver version: $version" >&2
            exit 1
          fi

          if [ "$version" != "$package_version" ]; then
            echo "Release version $version does not match apps/extension/package.json version $package_version" >&2
            exit 1
          fi

          if git rev-parse "v${version}" >/dev/null 2>&1; then
            echo "Tag v${version} already exists" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Run checks
        run: pnpm run ci

      - name: Build extension zip
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          WXT_SENTRY_DSN: ${{ secrets.WXT_SENTRY_DSN }}
          WXT_SENTRY_ENVIRONMENT: production
        run: pnpm --filter @dorv/extension zip

      - name: Locate extension zip
        id: artifact
        run: |
          zip_path="$(find apps/extension/.output -maxdepth 1 -type f -name '*.zip' | sort | tail -n 1)"
          if [ -z "$zip_path" ]; then
            echo "No extension zip found under apps/extension/.output" >&2
            exit 1
          fi
          echo "zip_path=$zip_path" >> "$GITHUB_OUTPUT"

      - name: Get Chrome Web Store access token
        if: ${{ inputs.publish_to_chrome }}
        id: chrome_token
        env:
          CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: |
          response="$(
            curl -fsS -X POST https://oauth2.googleapis.com/token \
              -d "client_id=${CWS_CLIENT_ID}" \
              -d "client_secret=${CWS_CLIENT_SECRET}" \
              -d "refresh_token=${CWS_REFRESH_TOKEN}" \
              -d "grant_type=refresh_token"
          )"
          access_token="$(node -e "const data = JSON.parse(process.argv[1]); if (!data.access_token) process.exit(1); process.stdout.write(data.access_token)" "$response")"
          echo "::add-mask::$access_token"
          echo "access_token=$access_token" >> "$GITHUB_OUTPUT"

      - name: Upload extension to Chrome Web Store
        if: ${{ inputs.publish_to_chrome }}
        env:
          ACCESS_TOKEN: ${{ steps.chrome_token.outputs.access_token }}
          ZIP_PATH: ${{ steps.artifact.outputs.zip_path }}
        run: |
          curl -fsS \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -X POST \
            -T "$ZIP_PATH" \
            "https://chromewebstore.googleapis.com/upload/v2/publishers/${{ secrets.CWS_PUBLISHER_ID }}/items/${{ secrets.CWS_EXTENSION_ID }}:upload"

      - name: Publish extension to Chrome Web Store
        if: ${{ inputs.publish_to_chrome }}
        env:
          ACCESS_TOKEN: ${{ steps.chrome_token.outputs.access_token }}
        run: |
          curl -fsS \
            -H "Authorization: Bearer ${ACCESS_TOKEN}" \
            -H "x-goog-api-version: 2" \
            -X POST \
            "https://chromewebstore.googleapis.com/v2/publishers/${{ secrets.CWS_PUBLISHER_ID }}/items/${{ secrets.CWS_EXTENSION_ID }}:publish"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_RELEASE_NOTES: ${{ inputs.release_notes }}
          PUBLISH_TO_CHROME: ${{ inputs.publish_to_chrome }}
          ZIP_PATH: ${{ steps.artifact.outputs.zip_path }}
        run: |
          tag="v${{ steps.version.outputs.version }}"
          notes="$INPUT_RELEASE_NOTES"
          if [ -z "$notes" ]; then
            notes="Automated dorv release ${tag}."
            if [ "$PUBLISH_TO_CHROME" = "true" ]; then
              notes="${notes}\n\nChrome Web Store publish was submitted for review."
            else
              notes="${notes}\n\nChrome Web Store publish was skipped."
            fi
          fi

          printf '%b\n' "$notes" > release-notes.md
          gh release create "$tag" "$ZIP_PATH" \
            --target "$GITHUB_SHA" \
            --title "$tag" \
            --notes-file release-notes.md
